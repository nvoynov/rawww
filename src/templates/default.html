<!DOCTYPE html>
<html lang="$if(lang)$$lang$$else$en$endif$">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Standard Primary SEO Layer -->
  <title>$if(title)$$title$ | RAWWW Engine$else$RAWWW Static Site$endif$</title>
  $if(description)$<meta name="description" content="$description$">$endif$
  
  <!-- Absolute Canonical Anchor: Automated by Rake and calculated per page model -->
  <link rel="canonical" href="$canonical_url$">  
  
  <!-- Branding Visual Identities Core Assets -->
  
  <link rel="icon" type="image/svg+xml" href="$root_path$/favicon.svg">
  <!-- 2. Dynamic root path injection for the master stylesheet -->
  <link rel="stylesheet" href="$root_path$/assets/css/style.css">
</head>

<body>
  <div class="site-container">
    <header class="site-header">
      <div class="site-title">
        <div class="site-title-text">
          <!-- 3. Dynamic root path injection for the home link -->
          <a href="$root_path$/index.html">
            <!-- 4. Dynamic root path injection for the header logo glyph -->
            <img src="$root_path$/favicon.svg" class="header-divider-icon" alt="RAWWW Logo" style="height: 1.5rem; vertical-align: middle; margin-right: 0.5rem;" />
            RAWWW
          </a>
        </div>
      </div>

      <!-- Core site navigation links with injected paths -->
      <nav class="site-nav">
        <!-- 5. Dynamic root path injection for navigation mapping -->
        <a href="$root_path$/index.html" class="nav-link">Home</a>
        <a href="$root_path$/about.html" class="nav-link">About</a>
      </nav>
    </header>

    <main class="content-container">
      <!-- Native Markdown text output channel compiled by Pandoc -->
      <div class="page-main-body-content">
        $body$
      </div>

      <!-- Pandoc native body injection channel -->
      $include-before$
    </main>

    <footer>
      <p>&copy; 2026 $if(author)$$author$$else$RAWWW Developer$endif$. All rights reserved.</p>
      <p style="font-size: 0.75rem; opacity: 0.6; margin-top: 5px;">
        Powered by Rake and Pandoc. Clean, minimal, raw web.
      </p>
    </footer>
  </div>
</body>
</html>
