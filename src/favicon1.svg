<svg xmlns="http://w3.org" viewBox="0 0 32 32">
  <style>
    /* Default light theme: charcoal dark polygons */
    .poly-1 { fill: #1a1a1a; opacity: 1.0; }
    .poly-2 { fill: #1a1a1a; opacity: 0.8; }
    .poly-3 { fill: #1a1a1a; opacity: 0.6; }

    /* Dark theme override: crisp white polygons */
    @media (prefers-color-scheme: dark) {
      .poly-1 { fill: #f5f5f5; opacity: 1.0; }
      .poly-2 { fill: #f5f5f5; opacity: 0.8; }
      .poly-3 { fill: #f5f5f5; opacity: 0.6; }
    }
  </style>

  <!-- Prism-styled geometric letter 'R' split into raw data facets -->
  <polygon class="poly-1" points="6,4 18,4 18,16 12,16 12,28 6,28" />
  <polygon class="poly-2" points="18,4 26,4 26,16 18,16" />
  <polygon class="poly-3" points="12,16 18,16 26,28 18,28" />
</svg>
