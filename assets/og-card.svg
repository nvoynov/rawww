<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Clean, matte background matching the rawww core layout -->
  <rect width="1200" height="630" fill="#fdfdfd" />

  <!-- LEFT ZONE: Branding & Radical Manifesto Call -->
  <g transform="translate(100, 140)">
    <!-- Micro Pixel Glyph Branding -->
    <path fill="#1a1a1a" d="M 0,0 H 28 V 14 H 17 V 33 H 9 V 14 H 0 Z M 9,14 H 25 V 0 H 20 V 8 H 9 Z M 9,14 H 17 L 25,33 H 17 L 9,17 Z" transform="scale(1.5) translate(0, -5)"/>
    
    <!-- Editorial Title -->
    <text x="50" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="300" letter-spacing="8" fill="#1a1a1a">RAWWW</text>
    
    <!-- Subtitle Tech Tag -->
    <text x="0" y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="400" letter-spacing="4" fill="#777777" text-transform="uppercase">Rake &amp; Pandoc Static Website Core</text>
    
    <!-- The Punchy Manifesto Line -->
    <text x="0" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="500" letter-spacing="1" fill="#1a1a1a">“The web is bloated. Let's make it raw again.”</text>
    <text x="0" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="400" line-height="1.6" fill="#444444">A zero-JS static template with an elegant containerized build pipeline.</text>
  </g>

  <!-- RIGHT ZONE: QR Code Matrix & Negative Monolith Watermark -->
  <!-- 1. Stylized Pixel-Art QR Code (Points to your live site) -->
  <g transform="translate(800, 390)" fill="#777777" opacity="0.8">
    <!-- Outer tracking markers designed out of matching raw pixel clusters -->
    <path d="M0,0 h30 v6 h-24 v24 h-6 Z M24,6 h6 v6 h-6 Z M6,24 h6 v6 h-6 Z"/>
    <path d="M0,50 h6 v6 h-6 Z M12,44 h6 v12 h-6 Z M24,44 h6 v6 h-6 Z M18,38 h6 v6 h-6 Z"/>
    <path d="M44,0 h12 v6 h-12 Z M38,12 h6 v12 h-6 Z M50,18 h6 v18 h-6 Z M38,30 h6 v6 h-6 Z"/>
    <path d="M38,50 h18 v6 h-18 Z M50,44 h6 v6 h-6 Z M38,38 h6 v6 h-6 Z"/>
    <!-- Core matrix noise blending with the master design language -->
    <rect x="12" y="12" width="6" height="6"/>
    <rect x="18" y="18" width="12" height="6"/>
    <rect x="12" y="30" width="6" height="12"/>
    <rect x="24" y="24" width="6" height="12"/>
  </g>

  <!-- 2. Dark Monolith Square Frame with Negative Cutout (Visual Anchor) -->
  <g transform="translate(930, 360)">
    <rect width="170" height="170" fill="#1a1a1a" rx="4" />
    <!-- White Inverted Negative R-Pixel Glyph inside the block -->
    <path fill="#fdfdfd" d="M 0,0 H 28 V 14 H 17 V 33 H 9 V 14 H 0 Z M 9,14 H 25 V 0 H 20 V 8 H 9 Z M 9,14 H 17 L 25,33 H 17 L 9,17 Z" transform="translate(56, 52) scale(1.8)"/>
  </g>
</svg>
