<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Standard Primary SEO Layer -->
  <title>Page Not Found | RAWWW Engine</title>
  <meta name="description" content="The requested page could not be
located.">
  
  <!-- Absolute Canonical Anchor: Automated by Rake and calculated per page model -->
  <link rel="canonical" href="https://nvoynov.github.io/rawww/404.html">  
  
  <!-- Open Graph / Facebook Production Layer -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nvoynov.github.io/rawww/404.html">
  <meta property="og:title" content="Page Not Found | RAWWW Engine">
  <meta property="og:description" content="Raw Markdown to WWW. A minimalist, high-utility static website engine driven by Ruby, Rake, and Pandoc.">
  <!-- Clean absolute path pointing straight to the root production banner -->
  <!-- <meta property="og:image" content="/rawww/og-card.svg"> -->
  <meta property="og:image" content="/rawww/assets/og-card.png">

  <!-- Branding Visual Identities Core Assets -->
  <link rel="icon" type="image/svg+xml" href="/rawww/assets/favicon.svg">
  <!-- 2. Dynamic root path injection for the master stylesheet -->
  <link rel="stylesheet" href="/rawww/assets/css/style.css">
</head>

<body>
  <div class="site-container">
    <header class="site-header">
      <div class="site-title">
        <div class="site-title-text">
          <!-- 3. Dynamic root path injection for the home link -->
          <a href="/rawww/index.html">
            <!-- 4. Dynamic root path injection for the header logo glyph -->
            <img src="/rawww/assets/favicon.svg" class="header-divider-icon" alt="RAWWW Logo" style="height: 1.5rem; vertical-align: middle; margin-right: 0.5rem;" />
            RAWWW
          </a>
        </div>
      </div>

      <!-- Core site navigation links with injected paths -->
      <nav class="site-nav">
        <!-- 5. Dynamic root path injection for navigation mapping -->
        <a href="/rawww/index.html" class="nav-link">Home</a>
        <a href="/rawww/readme.html" class="nav-link">Readme</a>
        <a href="/rawww/changelog.html" class="nav-link">Changelog</a>
        <a href="/rawww/about.html" class="nav-link">About</a>
      </nav>
    </header>

    <main class="content-container">
      <!-- Native Markdown text output channel compiled by Pandoc -->
      <div class="page-main-body-content">
        <section id="section" class="error-page-container">
        <h1>404</h1>
        <p>The page you are looking for does not exist, has been
        archived, or has been moved to a restricted directory layer.</p>
        <div class="error-return-link">
        <p><a href="index.html">Return to Main</a></p>
        </div>
        </section>
      </div>

      <!-- Pandoc native body injection channel -->
      
    </main>

    <footer>
      <p>&copy; 2026 Nikolay Voynov. All rights reserved.</p>
      <p style="font-size: 0.75rem; opacity: 0.6; margin-top: 5px;">
        Powered by Rake and Pandoc. Clean, minimal, raw web.
      </p>
    </footer>
  </div>
</body>
</html>
